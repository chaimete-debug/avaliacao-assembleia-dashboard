<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>27ª Assembleia Distrital – Matola | Dashboard de Avaliação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F7F8FC;
    --bg2:       #EEF1F8;
    --surface:   #FFFFFF;
    --surface2:  #F2F4FA;
    --border:    #E3E7F0;
    --border2:   #C8CFDF;
    --text:      #1A2035;
    --text2:     #4A5568;
    --muted:     #8896AF;

    --blue:      #1A3A6B;
    --blue-mid:  #2E6FAD;
    --blue-soft: #EBF3FB;
    --gold:      #B8860B;
    --gold-soft: #FEF6E4;
    --green:     #1A6B3A;
    --green-soft:#E8F5EE;
    --red:       #A8192A;
    --red-soft:  #FDEEF0;
    --amber:     #92600A;
    --amber-soft:#FEF3D7;
    --teal:      #0D6E7A;
    --teal-soft: #E5F5F7;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ──────────────────────────────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
    box-shadow: 0 1px 4px rgba(26,58,107,0.06);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--blue);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-title { font-size: 15px; font-weight: 600; color: var(--blue); letter-spacing: -.01em; }
  .header-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #sync-status  { font-size: 12px; color: var(--muted); }
  #sync-btn {
    background: var(--blue); color: #fff;
    border: none; border-radius: 8px;
    padding: 7px 16px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
    transition: background .15s; display: flex; align-items: center; gap: 6px;
    letter-spacing: .01em;
  }
  #sync-btn:hover { background: #122d52; }
  #sync-btn:disabled { opacity: .5; cursor: not-allowed; }
  .spin { display: inline-block; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOP BAND ────────────────────────────────────────────────────────────── */
  .top-band {
    background: var(--blue);
    padding: 10px 2rem;
    display: flex; align-items: center; gap: 16px;
  }
  .top-band-text { color: rgba(255,255,255,0.7); font-size: 12px; }
  .top-band-text strong { color: #fff; font-weight: 600; }

  /* ── FILTERS ─────────────────────────────────────────────────────────────── */
  .filters-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 2rem;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .filter-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
  select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 5px 12px; font-size: 12px; font-weight: 500;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer; outline: none; transition: border-color .15s;
    color: var(--text2);
  }
  select:hover, select:focus { border-color: var(--blue-mid); }
  #reset-filters {
    background: transparent; border: 1px solid var(--border2);
    border-radius: 7px; color: var(--muted);
    padding: 5px 12px; font-size: 12px; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif; transition: all .15s;
  }
  #reset-filters:hover { color: var(--red); border-color: var(--red); }
  #filter-count { font-size: 12px; color: var(--blue-mid); font-weight: 600; margin-left: auto; }

  /* ── MAIN ────────────────────────────────────────────────────────────────── */
  main { max-width: 1280px; margin: 0 auto; padding: 2rem; }

  /* ── LOADING ─────────────────────────────────────────────────────────────── */
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55vh; gap: 16px; }
  .loader { width: 40px; height: 40px; border: 3px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }
  .load-text { color: var(--muted); font-size: 13px; }

  #error-box { display: none; background: var(--red-soft); border: 1px solid #f5c0c6; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 13px; color: var(--red); }

  /* ── KPI CARDS ───────────────────────────────────────────────────────────── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px,1fr)); gap: 14px; margin-bottom: 2rem; }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.4rem 1.4rem 1.2rem;
    position: relative; overflow: hidden;
    transition: box-shadow .2s, transform .2s;
  }
  .kpi-card:hover { box-shadow: 0 4px 20px rgba(26,58,107,0.10); transform: translateY(-1px); }
  .kpi-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-bottom: 14px;
  }
  .kpi-card.blue  .kpi-icon { background: var(--blue-soft);  }
  .kpi-card.green .kpi-icon { background: var(--green-soft); }
  .kpi-card.gold  .kpi-icon { background: var(--gold-soft);  }
  .kpi-card.teal  .kpi-icon { background: var(--teal-soft);  }
  .kpi-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
  .kpi-value { font-size: 34px; font-weight: 600; line-height: 1; margin-bottom: 4px; letter-spacing: -.02em; }
  .kpi-card.blue  .kpi-value { color: var(--blue);  }
  .kpi-card.green .kpi-value { color: var(--green); }
  .kpi-card.gold  .kpi-value { color: var(--gold);  }
  .kpi-card.teal  .kpi-value { color: var(--teal);  }
  .kpi-sub { font-size: 12px; color: var(--muted); }
  .kpi-stripe {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  }
  .kpi-card.blue  .kpi-stripe { background: var(--blue);  }
  .kpi-card.green .kpi-stripe { background: var(--green); }
  .kpi-card.gold  .kpi-stripe { background: var(--gold);  }
  .kpi-card.teal  .kpi-stripe { background: var(--teal);  }

  /* ── SECTION ─────────────────────────────────────────────────────────────── */
  .section { margin-bottom: 2rem; }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .section-icon {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--blue-soft);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .section-title {
    font-size: 13px; font-weight: 700; color: var(--blue);
    text-transform: uppercase; letter-spacing: .07em;
  }

  /* ── INDICATOR TABLE ─────────────────────────────────────────────────────── */
  .indicator-list { display: flex; flex-direction: column; gap: 8px; }
  .ind-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: 1fr 200px 60px 100px;
    align-items: center; gap: 14px;
    transition: box-shadow .15s;
  }
  .ind-row:hover { box-shadow: 0 2px 12px rgba(26,58,107,0.08); }
  .ind-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .ind-bar-wrap { background: var(--bg2); border-radius: 6px; height: 8px; overflow: hidden; }
  .ind-bar { height: 100%; border-radius: 6px; transition: width .7s cubic-bezier(.4,0,.2,1); }
  .ind-score { font-size: 14px; font-weight: 700; text-align: center; font-family: 'Lora', serif; }
  .badge {
    font-size: 10px; font-weight: 700; padding: 4px 10px;
    border-radius: 20px; text-align: center;
    text-transform: uppercase; letter-spacing: .05em;
    border: 1px solid transparent;
  }
  .badge-ex { background: var(--green-soft); color: var(--green);  border-color: #b2dfc2; }
  .badge-bo { background: var(--blue-soft);  color: var(--blue-mid); border-color: #b8d4ee; }
  .badge-sa { background: var(--amber-soft); color: var(--amber);  border-color: #f0d8a0; }
  .badge-ma { background: var(--red-soft);   color: var(--red);    border-color: #f5b8be; }

  /* ── DIST TABLE ──────────────────────────────────────────────────────────── */
  .card-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .dist-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .dist-table th { text-align: left; padding: 10px 14px; background: var(--surface2); color: var(--muted); font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); }
  .dist-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); color: var(--text2); }
  .dist-table tr:last-child td { border-bottom: none; }
  .dist-table tr:hover td { background: var(--bg); }
  .dist-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid transparent; }
  .dp5 { background: var(--green-soft); color: var(--green);   border-color: #b2dfc2; }
  .dp4 { background: var(--blue-soft);  color: var(--blue-mid); border-color: #b8d4ee; }
  .dp3 { background: var(--amber-soft); color: var(--amber);   border-color: #f0d8a0; }
  .dp2 { background: #fff0e6;           color: #9a4700;         border-color: #f5c8a0; }
  .dp1 { background: var(--red-soft);   color: var(--red);     border-color: #f5b8be; }

  /* ── TWO-COL ─────────────────────────────────────────────────────────────── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 2rem; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

  /* ── PROFILE ─────────────────────────────────────────────────────────────── */
  .profile-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
  .profile-box:last-child { margin-bottom: 0; }
  .profile-box-title { padding: 10px 14px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .profile-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid var(--border); }
  .profile-row:last-child { border-bottom: none; }
  .profile-name { flex: 1; font-size: 12px; font-weight: 500; color: var(--text2); }
  .profile-bar-wrap { width: 90px; background: var(--bg2); border-radius: 4px; height: 6px; }
  .profile-bar { height: 100%; border-radius: 4px; }
  .profile-count { font-size: 11px; color: var(--muted); font-weight: 600; width: 64px; text-align: right; }

  /* ── OPINION ─────────────────────────────────────────────────────────────── */
  .opinion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .opinion-card { border-radius: 12px; padding: 1.4rem; display: flex; flex-direction: column; gap: 6px; border: 1px solid transparent; }
  .opinion-card.yes { background: var(--green-soft); border-color: #b2dfc2; }
  .opinion-card.no  { background: var(--red-soft);   border-color: #f5b8be; }
  .opinion-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; }
  .opinion-card.yes .opinion-label { color: var(--green); }
  .opinion-card.no  .opinion-label { color: var(--red);   }
  .opinion-value { font-size: 32px; font-weight: 700; line-height: 1; font-family: 'Lora', serif; letter-spacing: -.02em; }
  .opinion-card.yes .opinion-value { color: var(--green); }
  .opinion-card.no  .opinion-value { color: var(--red);   }
  .opinion-sub { font-size: 11px; color: var(--muted); }

  /* ── COMMENTS ────────────────────────────────────────────────────────────── */
  .comments-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .comments-grid { grid-template-columns: 1fr; } }
  .comments-col-title { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
  .comment-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; transition: box-shadow .15s; }
  .comment-card:hover { box-shadow: 0 2px 10px rgba(26,58,107,0.07); }
  .comment-card::before { content: '"'; font-family: 'Lora', serif; font-size: 28px; color: var(--border2); line-height: .8; display: block; margin-bottom: 4px; }
  .comment-text { font-size: 13px; line-height: 1.65; color: var(--text2); margin-bottom: 8px; }
  .comment-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .ctag { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; font-size: 10px; color: var(--muted); font-weight: 600; }
  .no-data { color: var(--muted); font-size: 13px; font-style: italic; padding: .75rem 0; }

  /* ── FOOTER ──────────────────────────────────────────────────────────────── */
  footer { text-align: center; padding: 2rem; color: var(--muted); font-size: 11px; border-top: 1px solid var(--border); margin-top: 2rem; }
  footer strong { color: var(--blue); }

  /* ── RESPONSIVE ──────────────────────────────────────────────────────────── */
  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    .filters-bar, main { padding: 1rem; }
    .header-sub { display: none; }
    .ind-row { grid-template-columns: 1fr 60px 100px; }
    .ind-bar-wrap { display: none; }
    .opinion-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">📊</div>
    <div>
      <div class="header-title">27ª Assembleia Distrital – Matola</div>
      <div class="header-sub">Dashboard de Avaliação · FGCI</div>
    </div>
  </div>
  <div class="header-right">
    <span id="sync-status">—</span>
    <button id="sync-btn" onclick="loadData()">
      <span id="sync-icon">↻</span> Actualizar
    </button>
  </div>
</header>

<div class="filters-bar">
  <span class="filter-label">Filtrar por</span>
  <select id="f-perfil" onchange="applyFilters()">
    <option value="">Todos os perfis</option>
    <option value="delegado">Delegado</option>
    <option value="convidado">Convidado</option>
    <option value="staff">Staff / Secretariado</option>
    <option value="observador">Observador</option>
  </select>
  <select id="f-genero" onchange="applyFilters()">
    <option value="">Todos os géneros</option>
    <option value="m">Masculino</option>
    <option value="f">Feminino</option>
  </select>
  <select id="f-igreja" onchange="applyFilters()">
    <option value="">Todas as igrejas</option>
  </select>
  <button id="reset-filters" onclick="resetFilters()">✕ Limpar</button>
  <span id="filter-count"></span>
</div>

<main>
  <div id="error-box"></div>
  <div id="loading">
    <div class="loader"></div>
    <div class="load-text">A carregar dados do KoboToolbox…</div>
  </div>
  <div id="dashboard" style="display:none"></div>
</main>

<footer>
  <strong>27ª Assembleia Distrital da Matola</strong> · FGCI – Frente de Gestão de Crescimento Integral · <span id="footer-year"></span>
</footer>

<script>
const INDICATORS = [
  { key: 'aval_credenciamento', label: 'Processo de Credenciamento'        },
  { key: 'aval_local',          label: 'Condições do Local (Conforto/Som)' },
  { key: 'aval_alimentacao',    label: 'Qualidade da Alimentação'          },
  { key: 'aval_pontualidade',   label: 'Cumprimento do Horário'            },
  { key: 'aval_temas',          label: 'Relevância dos Temas'              },
  { key: 'aval_metodologia',    label: 'Metodologia Adotada'               },
];
const PERFIS  = { delegado:'Delegado', convidado:'Convidado', staff:'Staff/Secretariado', observador:'Observador' };
const GENEROS = { m:'Masculino', f:'Feminino' };

let allData = [], filtered = [];
document.getElementById('footer-year').textContent = new Date().getFullYear();

async function loadData() {
  const btn = document.getElementById('sync-btn');
  const icon = document.getElementById('sync-icon');
  btn.disabled = true; icon.className = 'spin';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('sync-status').textContent = 'A carregar…';
  try {
    const resp = await fetch('/api/kobo');
    if (!resp.ok) throw new Error(`Proxy ${resp.status}: ${resp.statusText}`);
    const json = await resp.json();
    if (json.error) throw new Error(json.error);
    allData = json.results || [];
    populateIgrejaFilter();
    applyFilters();
    const now = new Date().toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('sync-status').textContent = `${allData.length} respostas · ${now}`;
  } catch(e) {
    const box = document.getElementById('error-box');
    box.style.display = 'block';
    box.textContent = `Erro ao carregar dados: ${e.message}`;
    document.getElementById('sync-status').textContent = 'Erro';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  } finally { btn.disabled = false; icon.className = ''; }
}

function populateIgrejaFilter() {
  const sel = document.getElementById('f-igreja');
  while (sel.options.length > 1) sel.remove(1);
  [...new Set(allData.map(r=>(r.proveniencia||'').trim()).filter(Boolean))].sort()
    .forEach(ch => { const o=document.createElement('option'); o.value=ch; o.textContent=ch; sel.appendChild(o); });
}

function applyFilters() {
  const perfil = document.getElementById('f-perfil').value;
  const genero = document.getElementById('f-genero').value;
  const igreja = document.getElementById('f-igreja').value;
  filtered = allData.filter(r =>
    (!perfil || r.perfil_participante===perfil) &&
    (!genero || r.genero===genero) &&
    (!igreja || r.proveniencia===igreja)
  );
  const active = [perfil,genero,igreja].filter(Boolean).length;
  document.getElementById('filter-count').textContent = active > 0 ? `${filtered.length} de ${allData.length} respostas` : '';
  renderDashboard(filtered);
}

function resetFilters() {
  ['f-perfil','f-genero','f-igreja'].forEach(id => document.getElementById(id).value='');
  applyFilters();
}

function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function pct(n, t) { return t>0 ? Math.round(n/t*100) : 0; }

function renderDashboard(data) {
  document.getElementById('loading').style.display = 'none';
  const dash = document.getElementById('dashboard');
  dash.style.display = 'block';
  const n = data.length;

  // KPIs
  let s=0,c=0;
  INDICATORS.forEach(ind => data.forEach(r => { const v=parseFloat(r[ind.key]); if(v>=1&&v<=5){s+=v;c++;} }));
  const gAvg = c>0 ? s/c : 0;
  const simCount = data.filter(r=>r.espaco_opiniao==='sim').length;
  const simPct   = pct(simCount, n);
  let bestLabel='—', bestScore=0;
  INDICATORS.forEach(ind => {
    const vals=data.map(r=>parseFloat(r[ind.key])).filter(v=>v>=1&&v<=5);
    const a=avg(vals); if(a>bestScore){bestScore=a;bestLabel=ind.label;}
  });

  // Indicator rows
  const indRows = INDICATORS.map(ind => {
    const vals=data.map(r=>parseFloat(r[ind.key])).filter(v=>v>=1&&v<=5);
    const a=avg(vals);
    const w=a>0?(a/5*100).toFixed(1):0;
    const col=a>=4?'#1A6B3A':a>=3?'#2E6FAD':a>=2?'#92600A':'#A8192A';
    const bcls=a>=4.5?'badge-ex':a>=3.5?'badge-bo':a>=2.5?'badge-sa':'badge-ma';
    const blbl=a>=4.5?'Excelente':a>=3.5?'Bom':a>=2.5?'Satisfatório':a>0?'Mau':'—';
    return `<div class="ind-row">
      <div class="ind-name">${ind.label}</div>
      <div class="ind-bar-wrap"><div class="ind-bar" style="width:${w}%;background:${col}"></div></div>
      <div class="ind-score" style="color:${col}">${a>0?a.toFixed(2):'—'}</div>
      <div class="badge ${bcls}">${blbl}</div>
    </div>`;
  }).join('');

  // Dist table
  const distRows = INDICATORS.map(ind => {
    const dist={5:0,4:0,3:0,2:0,1:0};
    data.forEach(r=>{const v=parseInt(r[ind.key]);if(dist[v]!==undefined)dist[v]++;});
    const tot=Object.values(dist).reduce((a,b)=>a+b,0);
    const cells=[5,4,3,2,1].map(k=>{
      const p=tot>0?Math.round(dist[k]/tot*100):0;
      return `<td><span class="dist-pill dp${k}">${dist[k]} <span style="opacity:.65">${p}%</span></span></td>`;
    }).join('');
    return `<tr><td style="font-weight:500;color:var(--text)">${ind.label}</td>${cells}<td style="font-weight:600;color:var(--muted)">${tot}</td></tr>`;
  }).join('');

  // Profile
  const mkPerfil = Object.entries(PERFIS).map(([k,v])=>{
    const cnt=data.filter(r=>r.perfil_participante===k).length;
    const p=pct(cnt,n);
    return `<div class="profile-row">
      <div class="profile-name">${v}</div>
      <div class="profile-bar-wrap"><div class="profile-bar" style="width:${p}%;background:var(--blue-mid)"></div></div>
      <div class="profile-count">${cnt} <span style="font-weight:400">(${p}%)</span></div>
    </div>`;
  }).join('');

  const mkGenero = Object.entries(GENEROS).map(([k,v])=>{
    const cnt=data.filter(r=>r.genero===k).length;
    const p=pct(cnt,n);
    return `<div class="profile-row">
      <div class="profile-name">${v}</div>
      <div class="profile-bar-wrap"><div class="profile-bar" style="width:${p}%;background:var(--gold)"></div></div>
      <div class="profile-count">${cnt} <span style="font-weight:400">(${p}%)</span></div>
    </div>`;
  }).join('');

  const churchMap={};
  data.forEach(r=>{const ch=(r.proveniencia||'').trim()||'(não indicado)';churchMap[ch]=(churchMap[ch]||0)+1;});
  const mkChurch=Object.entries(churchMap).sort((a,b)=>b[1]-a[1]).map(([ch,cnt])=>{
    const p=pct(cnt,n);
    return `<div class="profile-row">
      <div class="profile-name">${ch}</div>
      <div class="profile-bar-wrap"><div class="profile-bar" style="width:${p}%;background:var(--teal)"></div></div>
      <div class="profile-count">${cnt} <span style="font-weight:400">(${p}%)</span></div>
    </div>`;
  }).join('');

  // Opinion by profile
  const opRows=Object.entries(PERFIS).map(([k,v])=>{
    const sub=data.filter(r=>r.perfil_participante===k);
    const s=sub.filter(r=>r.espaco_opiniao==='sim').length;
    const p=sub.length>0?Math.round(s/sub.length*100):0;
    return `<tr>
      <td style="font-weight:500">${v}</td>
      <td style="text-align:center;color:var(--muted);font-weight:600">${sub.length}</td>
      <td style="text-align:center;color:var(--green);font-weight:700">${s}</td>
      <td style="text-align:center;color:var(--red);font-weight:700">${sub.length-s}</td>
      <td style="text-align:center;font-weight:700;color:${p>=50?'var(--green)':'var(--red)'}">${p}%</td>
    </tr>`;
  }).join('');

  // Comments
  const mkCard=(text,r)=>`<div class="comment-card">
    <div class="comment-text">${text}</div>
    <div class="comment-meta">
      <span class="ctag">${PERFIS[r.perfil_participante]||'—'}</span>
      <span class="ctag">${GENEROS[r.genero]||'—'}</span>
      ${r.proveniencia?`<span class="ctag">${r.proveniencia}</span>`:''}
    </div></div>`;

  const withF=data.filter(r=>(r.pontos_fortes||'').trim());
  const withM=data.filter(r=>(r.pontos_melhorar||'').trim());

  dash.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card blue">
        <div class="kpi-icon">📋</div>
        <div class="kpi-label">Total de Respostas</div>
        <div class="kpi-value">${n}</div>
        <div class="kpi-sub">formulários submetidos</div>
        <div class="kpi-stripe"></div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-icon">⭐</div>
        <div class="kpi-label">Média Global</div>
        <div class="kpi-value">${gAvg>0?gAvg.toFixed(2):'—'}</div>
        <div class="kpi-sub">em 6 indicadores</div>
        <div class="kpi-stripe"></div>
      </div>
      <div class="kpi-card gold">
        <div class="kpi-icon">🗣️</div>
        <div class="kpi-label">Espaço de Opinião</div>
        <div class="kpi-value">${simPct}%</div>
        <div class="kpi-sub">${simCount} responderam Sim</div>
        <div class="kpi-stripe"></div>
      </div>
      <div class="kpi-card teal">
        <div class="kpi-icon">🏆</div>
        <div class="kpi-label">Melhor Indicador</div>
        <div class="kpi-value">${bestScore>0?bestScore.toFixed(2):'—'}</div>
        <div class="kpi-sub">${bestLabel}</div>
        <div class="kpi-stripe"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-header"><div class="section-icon">📋</div><div class="section-title">Avaliação por Indicador (média 1–5)</div></div>
      <div class="indicator-list">${indRows}</div>
    </div>

    <div class="section">
      <div class="section-header"><div class="section-icon">📊</div><div class="section-title">Distribuição de Respostas</div></div>
      <div class="card-wrap" style="overflow-x:auto">
        <table class="dist-table">
          <thead><tr><th>Indicador</th><th>5 – Excelente</th><th>4 – Bom</th><th>3 – Satisfatório</th><th>2 – Mau</th><th>1 – Muito Mau</th><th>Total</th></tr></thead>
          <tbody>${distRows}</tbody>
        </table>
      </div>
    </div>

    <div class="two-col">
      <div>
        <div class="section-header"><div class="section-icon">👥</div><div class="section-title">Perfil dos Participantes</div></div>
        <div class="profile-box"><div class="profile-box-title">Por Perfil</div>${mkPerfil}</div>
        <div class="profile-box"><div class="profile-box-title">Por Género</div>${mkGenero}</div>
      </div>
      <div>
        <div class="section-header"><div class="section-icon">⛪</div><div class="section-title">Por Igreja / Proveniência</div></div>
        <div class="profile-box">${mkChurch||'<div class="profile-row"><div class="profile-name no-data">Sem dados</div></div>'}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header"><div class="section-icon">🗣️</div><div class="section-title">Espaço de Opinião</div></div>
      <div class="opinion-grid">
        <div class="opinion-card yes"><div class="opinion-label">Sim — tive espaço</div><div class="opinion-value">${simCount}</div><div class="opinion-sub">${simPct}% dos participantes</div></div>
        <div class="opinion-card no"><div class="opinion-label">Não — não senti espaço</div><div class="opinion-value">${n-simCount}</div><div class="opinion-sub">${100-simPct}% dos participantes</div></div>
      </div>
      <div class="card-wrap" style="overflow-x:auto">
        <table class="dist-table">
          <thead><tr><th>Perfil</th><th style="text-align:center">Total</th><th style="text-align:center">Sim</th><th style="text-align:center">Não</th><th style="text-align:center">% Sim</th></tr></thead>
          <tbody>${opRows}</tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <div class="section-header"><div class="section-icon">💬</div><div class="section-title">Comentários Abertos</div></div>
      <div class="comments-grid">
        <div>
          <div class="comments-col-title">✅ O que correu melhor <span style="color:var(--muted);font-weight:400">(${withF.length})</span></div>
          ${withF.length?withF.map(r=>mkCard(r.pontos_fortes,r)).join(''):'<div class="no-data">Sem comentários.</div>'}
        </div>
        <div>
          <div class="comments-col-title">🔧 O que deve ser melhorado <span style="color:var(--muted);font-weight:400">(${withM.length})</span></div>
          ${withM.length?withM.map(r=>mkCard(r.pontos_melhorar,r)).join(''):'<div class="no-data">Sem comentários.</div>'}
        </div>
      </div>
    </div>`;
}

loadData();
</script>
</body>
</html>
